name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: narrex_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/narrex_test
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/api
      - name: Migrate
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx migrate run --source ../../db/migrations
        env:
          SQLX_OFFLINE: "false"
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - name: Test
        run: cargo install cargo-nextest && cargo nextest run
        env:
          RUN_MODE: test
          JWT_SECRET: ci-test-secret
          GOOGLE_CLIENT_ID: ci-test
          GOOGLE_CLIENT_SECRET: ci-test

  web:
    name: Web (lint + test + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun tsc --noEmit
      - run: bun vitest run
