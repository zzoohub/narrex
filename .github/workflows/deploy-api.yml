name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "db/migrations/**"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: us-east4
      SERVICE: narrex-api

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        env:
          GAR_REGION: ${{ vars.GCP_REGION }}
        run: gcloud auth configure-docker "$GAR_REGION-docker.pkg.dev" --quiet

      - name: Set image tag
        id: meta
        env:
          GAR_REGION: ${{ vars.GCP_REGION }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          REGISTRY="$GAR_REGION-docker.pkg.dev/$PROJECT_ID/narrex"
          echo "image=$REGISTRY/api:$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "latest=$REGISTRY/api:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run migrations
        uses: dtolnay/rust-toolchain@stable
      - run: cargo install sqlx-cli --no-default-features --features postgres,rustls
      - run: sqlx migrate run --source db/migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Cloud Run (image only)
        run: |
          gcloud run services update "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION"
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
